# Libra Mosquitto broker — v0 dev config.
#
# Two listeners:
#   1883/tcp   plain MQTT (vision service, future device clients)
#   9001/tcp   MQTT over websockets (future browser dashboards)
#
# Allow anonymous within this docker network. Lock this down with a
# password file and TLS before exposing the broker to other networks.

persistence true
persistence_location /mosquitto/data/

log_dest stdout
log_type error
log_type warning
log_type notice

listener 1883
protocol mqtt
allow_anonymous true

listener 9001
protocol websockets
allow_anonymous true
