name: libra

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-libra}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-libra}
      POSTGRES_DB: ${POSTGRES_DB:-libra}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-libra} -d ${POSTGRES_DB:-libra}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      LIBRA_API_HOST: 0.0.0.0
      LIBRA_API_PORT: 8000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../apps/api:/app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/health').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 6

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      NEXT_PUBLIC_API_WS_BASE_URL: ws://localhost:8000
    working_dir: /repo/apps/web
    command: ["pnpm", "dev"]
    ports:
      - "3000:3000"
    depends_on:
      - api
    volumes:
      # Bind the whole monorepo so edits hot-reload.
      - ..:/repo
      # Keep the container's installed node_modules / build cache
      # instead of being shadowed by the (likely empty) host paths.
      - /repo/node_modules
      - /repo/apps/web/node_modules
      - /repo/apps/web/.next
      - /repo/packages/shared-types/node_modules
      - /repo/packages/prompts/node_modules

volumes:
  postgres-data:
  redis-data:
